<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Fitness Tracker</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body
    style="
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0b2e, #063940);
      font-family:
        &quot;Lucida Sans&quot;, &quot;Lucida Sans Regular&quot;,
        &quot;Lucida Grande&quot;, &quot;Lucida Sans Unicode&quot;, Geneva,
        Verdana, sans-serif;
    "
  >
    <div class="container">
      <div
        class="row justify-content-center align-items-center"
        style="min-height: 100vh"
      >
        <div class="col-md-5">
          <div class="card shadow-lg border-0" style="border-radius: 20px">
            <div class="card-body p-5">
              <h2 class="text-center fw-bold mb-4" style="color: #1a0b2e">
                Create Account
              </h2>

              <form id="registerForm">
                <div class="mb-3">
                  <label class="form-label"> Username </label>

                  <input
                    type="text"
                    id="username"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-4">
                  <label class="form-label"> Password </label>

                  <input
                    type="password"
                    id="password"
                    class="form-control"
                    required
                  />
                </div>

                <button
                  type="submit"
                  class="btn w-100 text-white"
                  style="background-color: #6366f1"
                >
                  Register
                </button>
              </form>

              <p class="text-center mt-4 mb-0">
                Already have an account?

                <a
                  href="login.html"
                  style="
                    color: #6366f1;
                    text-decoration: none;
                    font-weight: bold;
                  "
                >
                  Login
                </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      var API_BASE =
        "https://student-fitness-performance-tracker-production.up.railway.app";

      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          var submitBtn = document.querySelector('#registerForm button[type="submit"]');
          var originalText = submitBtn.innerText;

          // Loading state feedback
          submitBtn.disabled = true;
          submitBtn.innerText = "Registering...";

          var usernameVal = document.getElementById("username").value;
          var passwordVal = document.getElementById("password").value;

          fetch(API_BASE + "/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username: usernameVal,
              password: passwordVal,
            }),
          })
          .then(function (response) {
            if (response.ok) {
              alert("Registration Successful!");
              location.href = "login.html";
            } else {
              throw new Error("Username might already be taken.");
            }
          })
          .catch(function (error) {
            console.error(error);
            alert("Error: " + error.message);
          })
          .then(function () {
            submitBtn.disabled = false;
            submitBtn.innerText = originalText;
          });
        });
    </script>
  </body>
</html>
